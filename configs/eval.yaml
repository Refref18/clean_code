# eval_height.yaml — used by plan_height.py
# Run: python plan_height.py -c configs/eval_height.yaml
#
# One case per unique object pool per N.
# n_scenarios_per_n caps how many pools are evaluated per prefix length.
# If n_scenarios_per_n > available pools, pools are reused to fill the quota.

model_name: "symcan_trial3"

data:
  dataset_csv:     "data.csv"
  depth_image_dir: "DEPTH_IMAGES"

planner:
  fast_downward:  "/home/color/Masaüstü/FD/downward/fast-downward.py"
  search:         "eager_greedy([ff()])"
  time_limit_sec: 1000

eval:
  seed:               42
  simulate:           true    # false = verify against data.csv instead of running PyBullet

  min_objects:        2       # smallest prefix length to evaluate
  max_objects:        6       # largest prefix length to evaluate
  z_level_threshold:  0.1     # height threshold for stepwise level counting

  n_scenarios_per_n:  5      # max cases per N (unique pools first); 0 = all