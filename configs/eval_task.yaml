# eval_task.yaml — used by plan_task.py
# Run: python plan_task.py -c configs/eval_task.yaml
#
# One case per tower prefix of length N that contains the task relation.
# n_baseline_scenarios caps how many cases per N (unique object pools first).
# If n_baseline_scenarios > available pools, pools are reused to fill the quota.

model_name: "symcan_trial3"

data:
  dataset_csv:     "data.csv"
  depth_image_dir: "DEPTH_IMAGES"

planner:
  fast_downward:  "/home/color/Masaüstü/FD/downward/fast-downward.py"
  search:         "eager_greedy([ff()])"
  time_limit_sec: 1000

eval:
  seed:                 42
  simulate:             true    # false = verify against data.csv instead of running PyBullet

  task:                 "inside"   # inside | occlude
  goal_mode:            "specific" # specific = require the dataset pair | any = any pair achieves task
  width_epsilon:        0.0        # increase if wrong task symbol is selected

  min_objects:          2          # smallest prefix length to evaluate
  max_objects:          6          # largest prefix length to evaluate

  n_baseline_scenarios: 5         # max cases per N (unique pools first); 0 = all